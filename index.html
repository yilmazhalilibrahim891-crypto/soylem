<head>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:#0E1116; font-family: system-ui, -apple-system, sans-serif; color:#ECE8DD; }

  #loginScreen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }

  .sub { color:#8B8F98; font-size:14px; margin:2px 0 22px; }

  .btnPrimary { width:100%; margin-top:10px; background:#C9A227; color:#0E1116; border:none; border-radius:8px; padding:12px 0; font-weight:700; font-size:14px; cursor:pointer; }

<script>
// ====== FIREBASE CONFIG ======
const firebaseConfig = {
  apiKey: "AIzaSyCX7lCeYAalq9iV2VDOEO9p5mnHEItPx0c",
  authDomain: "soylem-app.firebaseapp.com",
  projectId: "soylem-app",
  storageBucket: "soylem-app.firebasestorage.app",
  messagingSenderId: "363422182384",
  appId: "1:363422182384:web:ced78eee7d4def255a4b35",
  measurementId: "G-MFELW2NVZF"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ====== STATE ======
let currentUser = null; // {uid, displayName, bio, following:[]}
let usersCache = {};
let postsCache = [];
let view = { name: "feed" };
let isSignup = false;
let composerImageData = null;
let uploadingPhoto = false;
let notificationsCache = [];
let searchQuery = "";
let editingBio = false;
let feedFilter = "all"; // "all" | "following"
let dmsCache = [];
let editingPostId = null;
let chatDraft = "";
let composerQuote = null; // alıntılanan söz id'si
let composerPoll = null;  // ["seçenek1","seçenek2",...] veya null
let detailReturn = null;  // söz detayından geri dönülecek görünüm
let editingUsername = false;
let handledHash = false;  // sayfa açılışında #soz/ID linki bir kez işlensin

// Tema
if (localStorage.getItem('soylemTheme') === 'light') document.body.classList.add('light');

// ====== HELPERS ======
function timeAgo(ts){
  if(!ts) return "";
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return `${s}sn`;
  const m = Math.floor(s/60); if (m<60) return `${m}dk`;
  const h = Math.floor(m/60); if (h<24) return `${h}sa`;
  return `${Math.floor(h/24)}g`;
}
const HUES = ["#C9A227","#8A6BB1","#4E8098","#B1543F","#5E8C61"];
function hueFor(name){
  const s = (name||"").split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  return HUES[s % HUES.length];
}
function avatarHTML(name, size=40, onclick="", photoURL=null){
  if (photoURL) {
    return `<button class="avatar" ${onclick} style="width:${size}px;height:${size}px;padding:0;overflow:hidden;"><img class="avatarImg" src="${photoURL}" /></button>`;
  }
  const letter = (name||"?").trim().charAt(0).toUpperCase();
  return `<button class="avatar" ${onclick} style="width:${size}px;height:${size}px;background:${hueFor(name)};font-size:${size*0.42}px;">${letter}</button>`;
}
function esc(s){ const d=document.createElement('div'); d.innerText = s||""; return d.innerHTML; }

// Metindeki #hashtag ve linkleri tıklanabilir hale getirir (önce escape edilir, XSS güvenli)
function linkify(text){
  let safe = esc(text||"");
  safe = safe.replace(/(https?:\/\/[^\s<]+)/g, (m) => `<a class="postLink" href="${m}" target="_blank" rel="noopener">${m}</a>`);
  safe = safe.replace(/(^|[\s])#([\wğüşıöçĞÜŞİÖÇ]+)/g, (m, pre, tag) => `${pre}<span class="hashtag" data-hashtag="${esc(tag)}">#${esc(tag)}</span>`);
  safe = safe.replace(/(^|[\s])@([\wğüşıöçĞÜŞİÖÇ]+)/g, (m, pre, name) => `${pre}<span class="hashtag" data-mention="${esc(name)}">@${esc(name)}</span>`);
  return safe;
}

// @etiket -> kullanıcı eşleştirme (ad boşluksuz ya da ilk isim)
function findUserByMention(tag){
  const t = (tag||"").toLowerCase();
  if (!t) return null;
  for (const [id, u] of Object.entries(usersCache)) {
    if ((u.username||"").toLowerCase() === t) return id;
  }
  for (const [id, u] of Object.entries(usersCache)) {
    const dn = (u.displayName||"").toLowerCase().trim();
    if (dn.replace(/\s+/g,'') === t || dn.split(/\s+/)[0] === t) return id;
  }
  return null;
}

// Metindeki @etiketlere bildirim gönderir
function notifyMentions(text, postId){
  const tags = (text||"").match(/(^|[\s])@([\wğüşıöçĞÜŞİÖÇ]+)/g) || [];
  const done = new Set();
  tags.forEach(t => {
    const uid = findUserByMention(t.trim().slice(1));
    if (uid && !done.has(uid)) {
      done.add(uid);
      createNotification(uid, 'mention', postId ? { postId } : {});
    }
  });
}

// Resmi küçültüp base64'e çevirir (Firestore belge boyutu sınırlı olduğu için)
function resizeImageFile(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
        else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function showError(msg){

document.getElementById('authSubmitBtn').onclick = async () => {
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const displayName = document.getElementById('displayNameInput').value.trim();
  const errEl = document.getElementById('authError');
  errEl.textContent = "";

  errEl.style.color = "";
  if (!email || !password) { errEl.textContent = "E-posta ve şifre gerekli."; return; }
  if (isSignup && !displayName) { errEl.textContent = "Görünen ad gerekli."; return; }
  let username = "";
  if (isSignup) {
    username = document.getElementById('usernameInput').value.trim().toLowerCase().replace(/^@/, '');
    if (!/^[a-z0-9_]{3,15}$/.test(username)) {
      errEl.textContent = "Kullanıcı adı 3-15 karakter olmalı; sadece küçük harf, rakam ve _ içerebilir.";
      return;
    }
  }

  try {
    if (isSignup) {
      const taken = await db.collection('users').where('username', '==', username).limit(1).get();
      if (!taken.empty) { errEl.textContent = "Bu kullanıcı adı alınmış, başka bir tane dene."; return; }
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      await db.collection('users').doc(cred.user.uid).set({
        displayName, username, bio: "", following: [], createdAt: Date.now()
      });
    } else {
      await auth.signInWithEmailAndPassword(email, password);
    }
  } catch (e) {
    errEl.textContent = friendlyAuthError(e.code);
  }
};

function friendlyAuthError(code){
  const map = {
    'auth/email-already-in-use': 'Bu e-posta zaten kayıtlı.',
    'auth/invalid-email': 'Geçersiz e-posta adresi.',
    'auth/weak-password': 'Şifre en az 6 karakter olmalı.',
    'auth/user-not-found': 'Kullanıcı bulunamadı.',
    'auth/wrong-password': 'Şifre yanlış.',
    'auth/invalid-credential': 'E-posta veya şifre yanlış.',
  };
  return map[code] || 'Bir hata oluştu, tekrar dene.';
}

auth.onAuthStateChanged(async (user) => {

function startListeners(){
  unsubUsers = db.collection('users').onSnapshot(snap => {
    usersCache = {};
    snap.forEach(d => usersCache[d.id] = d.data());
    if (currentUser && usersCache[currentUser.uid]) {
      currentUser = { uid: currentUser.uid, ...usersCache[currentUser.uid] };
    }
    render();
  }, err => showError("Kullanıcılar yüklenemedi."));

  unsubPosts = db.collection('posts').orderBy('createdAt','desc').limit(100).onSnapshot(snap => {
    postsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (!handledHash) {
      handledHash = true;
      const m = location.hash.match(/^#soz\/([A-Za-z0-9]+)/);
      if (m && postsCache.find(p => p.id === m[1])) {
        view = { name: 'postDetail', post: m[1] };
        loadComments(m[1]);
      }
    }
    render();
  }, err => showError("Gönderiler yüklenemedi."));

  unsubNotifs = db.collection('notifications')
    .where('toUid', '==', currentUser.uid)
    .orderBy('createdAt', 'desc')
    .limit(50)
    .onSnapshot(snap => {
      notificationsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateNotifBadge();
      if (view.name === 'notifications') render();
    }, err => {});

  unsubDMs = db.collection('messages')
    .where('participants', 'array-contains', currentUser.uid)
    .onSnapshot(snap => {
      dmsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      dmsCache.sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
      updateDMBadge();
      if (view.name === 'dms' || view.name === 'chat') render();
    }, err => {});
}

function updateDMBadge(){
  const badge = document.getElementById('dmBadge');
  if (!badge) return;
  const unread = dmsCache.filter(m => m.toUid === currentUser.uid && !m.read).length;
  badge.textContent = unread > 9 ? '9+' : String(unread);
  badge.classList.toggle('hidden', unread === 0);
}

  try {
    await db.collection('messages').add({
      participants: [currentUser.uid, toUid],
      fromUid: currentUser.uid, toUid, text,
      createdAt: Date.now(), read: false
    });

async function markChatRead(otherUid){
  const unread = dmsCache.filter(m => m.fromUid === otherUid && m.toUid === currentUser.uid && !m.read);
  if (unread.length === 0) return;
  try {

    unread.forEach(m => batch.update(db.collection('messages').doc(m.id), { read: true }));
    await batch.commit();
  } catch(e){}

// ====== ACTIONS ======
function pollReady(){
  return composerPoll && composerPoll.map(s=>s.trim()).filter(Boolean).length >= 2;
}
function canPostNow(){
  const ta = document.getElementById('composerText');
  const t = ta ? ta.value.trim() : "";
  return !!(t || composerImageData || composerQuote || pollReady());
}

async function postTweet(){
  const ta = document.getElementById('composerText');
  const text = ta.value.trim();
  if (!canPostNow() || !currentUser) return;
  ta.disabled = true;
  try {
    const data = {
      authorUid: currentUser.uid,
      text,
      createdAt: Date.now(),
      likes: [],
      retweets: [],
    };
    if (composerImageData) data.imageData = composerImageData;
    if (composerQuote) data.quoteOf = composerQuote;
    if (pollReady()) {
      data.poll = composerPoll.map(s=>s.trim()).filter(Boolean);
      data.pollVotes = {};
    }
    const docRef = await db.collection('posts').add(data);
    notifyMentions(text, docRef.id);
    if (composerQuote) {
      const q = postsCache.find(p=>p.id===composerQuote);
      if (q) createNotification(q.authorUid, 'quote', { postId: composerQuote });
    }
    ta.value = "";
    composerImageData = null;
    composerQuote = null;
    composerPoll = null;
    render();
  } catch(e){ showError("Gönderilemedi, tekrar dene. (Resim çok büyük olabilir)"); }
  ta.disabled = false;
}

function preserveComposerTextAcrossRender(fn){
  const ta = document.getElementById('composerText');
  const savedText = ta ? ta.value : "";
  fn();
  render();
  const newTa = document.getElementById('composerText');
  if (newTa) {
    newTa.value = savedText;
    document.getElementById('charCount').textContent = 280 - savedText.length;
    document.getElementById('postBtn').disabled = !canPostNow();
  }
}

async function voteOnPoll(postId, idx){
  const post = postsCache.find(p=>p.id===postId);
  if (!post || !post.poll) return;
  const votes = post.pollVotes || {};
  let myVote = -1;
  post.poll.forEach((o,i)=>{ if ((votes[i]||[]).includes(currentUser.uid)) myVote = i; });
  if (myVote === idx) return;
  const upd = {};
  upd['pollVotes.'+idx] = firebase.firestore.FieldValue.arrayUnion(currentUser.uid);
  if (myVote >= 0) upd['pollVotes.'+myVote] = firebase.firestore.FieldValue.arrayRemove(currentUser.uid);
  try { await db.collection('posts').doc(postId).update(upd); }
  catch(e){ showError("Oy verilemedi."); }
}

// Metindeki YouTube ya da mp4/webm linkini oynatıcıya çevirir
function videoEmbedHTML(text){
  const t = text || "";
  const yt = t.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([\w-]{6,20})/);
  if (yt) return `<iframe class="videoEmbed" src="https://www.youtube.com/embed/${yt[1]}" allowfullscreen loading="lazy"></iframe>`;
  const mp4 = t.match(/https?:\/\/[^\s<]+\.(?:mp4|webm)/i);
  if (mp4) return `<video class="videoFile" src="${mp4[0]}" controls preload="metadata"></video>`;
  return "";
}

function render(){
  if (!currentUser) return;
  document.querySelectorAll('.navBtn').forEach(b=>b.classList.remove('active'));
  if (view.name === 'feed' || view.name === 'postDetail') document.getElementById('navFeed').classList.add('active');
  if (view.name === 'profile' && view.user === currentUser.uid) document.getElementById('navProfile').classList.add('active');
  if (view.name === 'search') document.getElementById('navSearch').classList.add('active');
  if (view.name === 'notifications') document.getElementById('navNotifs').classList.add('active');
  if (view.name === 'dms' || view.name === 'chat') document.getElementById('navDMs').classList.add('active');
  if (view.name === 'saved') document.getElementById('navSaved').classList.add('active');
  updateNotifBadge();
  updateDMBadge();

  const feedEl = document.getElementById('feedView');
  const profileEl = document.getElementById('profileView');
  const searchEl = document.getElementById('searchView');
  const notifsEl = document.getElementById('notifsView');
  const dmsEl = document.getElementById('dmsView');
  const savedEl = document.getElementById('savedView');
  feedEl.classList.add('hidden'); profileEl.classList.add('hidden');
  searchEl.classList.add('hidden'); notifsEl.classList.add('hidden');
  dmsEl.classList.add('hidden'); savedEl.classList.add('hidden');

  if (view.name === 'feed') {
    feedEl.classList.remove('hidden');
    feedEl.innerHTML = renderFeed();
    document.getElementById('postBtn').onclick = postTweet;
    document.getElementById('composerText').oninput = (e)=>{
      document.getElementById('charCount').textContent = 280 - e.target.value.length;
      document.getElementById('postBtn').disabled = !canPostNow();
    };
    document.getElementById('imgPickBtn').onclick = () => document.getElementById('composerImgInput').click();
    document.getElementById('composerImgInput').onchange = (e) => handleComposerImagePick(e.target);
    document.getElementById('pollBtn').onclick = () => preserveComposerTextAcrossRender(() => {
      composerPoll = composerPoll ? null : ["",""];
    });
    document.querySelectorAll('[data-pollopt]').forEach(el=>{
      el.oninput = (e) => {
        composerPoll[parseInt(el.getAttribute('data-pollopt'))] = e.target.value;
        document.getElementById('postBtn').disabled = !canPostNow();
      };
    });
    const pollAddBtn = document.getElementById('pollAddBtn');
    if (pollAddBtn) pollAddBtn.onclick = () => preserveComposerTextAcrossRender(() => { composerPoll.push(""); });
    const pollRemoveBtn = document.getElementById('pollRemoveBtn');
    if (pollRemoveBtn) pollRemoveBtn.onclick = () => preserveComposerTextAcrossRender(() => { composerPoll = null; });
    const removeQuoteBtn = document.getElementById('removeQuoteBtn');
    if (removeQuoteBtn) removeQuoteBtn.onclick = () => preserveComposerTextAcrossRender(() => { composerQuote = null; });
    const removeBtn = document.getElementById('removeImgBtn');
    if (removeBtn) removeBtn.onclick = removeComposerImage;
    document.querySelectorAll('[data-feedtab]').forEach(el=>{
      el.onclick = () => preserveComposerTextAcrossRender(() => { feedFilter = el.getAttribute('data-feedtab'); });
    });
    bindPostEvents();
  } else if (view.name === 'profile') {
    profileEl.classList.remove('hidden');
    profileEl.innerHTML = renderProfile(view.user);
    bindPostEvents();
    const followBtn = document.getElementById('followBtn');
    if (followBtn) followBtn.onclick = () => toggleFollow(view.user);
    const blockBtn = document.getElementById('blockBtn');
    if (blockBtn) blockBtn.onclick = () => toggleBlock(view.user);
    const reportBtn = document.getElementById('reportBtn');
    if (reportBtn) reportBtn.onclick = () => reportContent(view.user, null);
    const msgBtn = document.getElementById('msgBtn');
    if (msgBtn) msgBtn.onclick = () => { chatDraft = ""; view = { name:'chat', user: view.user }; render(); };
    const coverBtn = document.getElementById('coverBtn');
    const coverInput = document.getElementById('coverInput');
    if (coverBtn && coverInput) {
      coverBtn.onclick = () => coverInput.click();
      coverInput.onchange = (e) => handleCoverPick(e.target);
    }
    const photoBtn = document.getElementById('profilePhotoBtn');
    const photoInput = document.getElementById('profilePhotoInput');
    if (photoBtn && photoInput) {
      photoBtn.onclick = () => photoInput.click();
      photoInput.onchange = (e) => handleProfilePhotoPick(e.target);
    }
    const editBioBtn = document.getElementById('editBioBtn');
    if (editBioBtn) editBioBtn.onclick = () => { editingBio = true; render(); };
    const saveBioBtn = document.getElementById('saveBioBtn');
    if (saveBioBtn) saveBioBtn.onclick = saveBio;
    const cancelBioBtn = document.getElementById('cancelBioBtn');
    if (cancelBioBtn) cancelBioBtn.onclick = () => { editingBio = false; render(); };
    const editUsernameBtn = document.getElementById('editUsernameBtn');
    if (editUsernameBtn) editUsernameBtn.onclick = () => { editingUsername = true; render(); };
    const saveUsernameBtn = document.getElementById('saveUsernameBtn');
    if (saveUsernameBtn) saveUsernameBtn.onclick = saveUsername;
    const cancelUsernameBtn = document.getElementById('cancelUsernameBtn');
    if (cancelUsernameBtn) cancelUsernameBtn.onclick = () => { editingUsername = false; render(); };
    document.querySelectorAll('[data-follows]').forEach(el=>{
      el.onclick = () => {
        const [uid, tab] = el.getAttribute('data-follows').split('|');
        view = { name:'follows', user: uid, tab };
        render();
      };
    });
  } else if (view.name === 'follows') {
    profileEl.classList.remove('hidden');
    profileEl.innerHTML = renderFollows(view.user, view.tab);
    document.getElementById('followsBack').onclick = () => { view = { name:'profile', user: view.user }; render(); };
    document.querySelectorAll('[data-followstab]').forEach(el=>{
      el.onclick = () => { view.tab = el.getAttribute('data-followstab'); render(); };
    });
    document.querySelectorAll('[data-followuser]').forEach(el=>{
      el.onclick = () => toggleFollow(el.getAttribute('data-followuser'));
    });
    document.querySelectorAll('#profileView [data-profile]').forEach(el=>{
      el.onclick = () => { view = { name:'profile', user: el.getAttribute('data-profile') }; render(); };
    });
  } else if (view.name === 'postDetail') {
    feedEl.classList.remove('hidden');
    feedEl.innerHTML = renderPostDetail(view.post);
    const back = document.getElementById('detailBack');
    if (back) back.onclick = () => { history.replaceState(null, '', location.pathname + location.search); view = detailReturn || { name:'feed' }; detailReturn = null; render(); };
    bindPostEvents();
  } else if (view.name === 'search') {
    searchEl.classList.remove('hidden');
    searchEl.innerHTML = renderSearch();
    const input = document.getElementById('searchInput');
    input.oninput = (e) => { searchQuery = e.target.value; renderSearchResultsOnly(); };
    input.focus();
    input.value = searchQuery;
    input.selectionStart = input.selectionEnd = input.value.length;
    renderSearchResultsOnly();
  } else if (view.name === 'notifications') {
    notifsEl.classList.remove('hidden');
    notifsEl.innerHTML = renderNotifications();
    document.querySelectorAll('[data-notif-goto]').forEach(el=>{
      el.onclick = () => {
        const pid = el.getAttribute('data-notif-post');
        if (pid && postsCache.find(p=>p.id===pid)) {
          detailReturn = { name:'notifications' };
          view = { name:'postDetail', post: pid };
          render();
          loadComments(pid);
        } else {
          view = { name:'profile', user: el.getAttribute('data-notif-goto') };
          render();
        }
      };
    });
  } else if (view.name === 'dms') {
    dmsEl.classList.remove('hidden');
    dmsEl.innerHTML = renderDMList();
    document.querySelectorAll('[data-chat]').forEach(el=>{
      el.onclick = () => { chatDraft = ""; view = { name:'chat', user: el.getAttribute('data-chat') }; render(); };
    });
  } else if (view.name === 'chat') {
    dmsEl.classList.remove('hidden');
    dmsEl.innerHTML = renderChat(view.user);
    document.getElementById('chatBack').onclick = () => { view = { name:'dms' }; render(); };
    const csb = document.getElementById('chatSendBtn');
    if (csb) csb.onclick = () => sendDM(view.user);
    const ci = document.getElementById('chatInput');
    if (ci) {
      ci.value = chatDraft;
      ci.oninput = (e) => { chatDraft = e.target.value; };
      ci.onkeydown = (e) => { if (e.key === 'Enter') sendDM(view.user); };
    }
    markChatRead(view.user);
    window.scrollTo(0, document.body.scrollHeight);
  } else if (view.name === 'saved') {
    savedEl.classList.remove('hidden');
    const saved = postsCache.filter(p => (p.bookmarks||[]).includes(currentUser.uid) && !isBlockedBetween(p.authorUid));
    savedEl.innerHTML = `<h2 style="font-family:Georgia,serif; font-size:20px; margin-bottom:8px;">🔖 Kaydedilenler</h2>` +
      (saved.length ? saved.map(renderPost).join("") : `<div class="emptyState">Henüz kaydedilen söz yok.<br>Sözlerdeki 🔖 ikonuna basarak kaydet.</div>`);
    bindPostEvents();
  }
}

            <span class="dim" id="charCount">280</span>
          </div>

        </div>
      </div>
    </div>
    <div class="divider"></div>
  `;

  html += renderTrends();
  if ((me.following||[]).length < 3) html += renderSuggestions();

  html += `
    <div class="feedTabs">
      <button class="feedTab ${feedFilter==='all'?'active':''}" data-feedtab="all">Herkes</button>
      <button class="feedTab ${feedFilter==='following'?'active':''}" data-feedtab="following">Takip Ettiklerim</button>
    </div>
  `;

  let posts = postsCache.filter(p => !isBlockedBetween(p.authorUid));
  if (feedFilter === 'following') {
    const fset = new Set([...(me.following||[]), me.uid]);
    posts = posts.filter(p => fset.has(p.authorUid));

  if (posts.length === 0) {

      ? `<div class="emptyState">Takip ettiklerinden henüz söz yok.</div>` + renderSuggestions()

  } else {
    html += posts.map(renderPost).join("");
  }
  return html;
}

// ====== TAKİP ÖNERİLERİ ======
function renderSuggestions(){
  const counts = {};
  Object.values(usersCache).forEach(u => {
    (u.following||[]).forEach(f => counts[f] = (counts[f]||0) + 1);
  });
  const skip = new Set([...(currentUser.following||[]), currentUser.uid]);
  const cands = Object.keys(usersCache)
    .filter(id => !skip.has(id) && !isBlockedBetween(id))
    .sort((a,b) => (counts[b]||0) - (counts[a]||0))
    .slice(0, 5);
  if (!cands.length) return "";
  return `
    <div class="trendBox">
      <div class="trendTitle">✨ Tanıyor olabileceklerin</div>
      ${cands.map(id => {
        const u = usersCache[id] || { displayName: "?" };
        return `<div class="suggestRow">
          <span data-profile="${id}" style="display:flex; align-items:center; gap:10px; flex:1; min-width:0; cursor:pointer;">
            ${avatarHTML(u.displayName, 36, "", u.photoURL)}
            <span style="min-width:0;">
              <span style="font-weight:700; font-size:14px; display:block;">${esc(u.displayName)}${verifiedBadge(u)}</span>
              ${u.username ? `<span class="dim" style="display:block;">@${esc(u.username)}</span>` : ""}
            </span>
          </span>
          <button class="followBtn" data-followuser="${id}" style="flex-shrink:0;">Takip et</button>
        </div>`;
      }).join("")}
    </div>
  `;
}

// ====== GÜNDEM (TREND HASHTAGLER) ======
function renderTrends(){
  const counts = {};
  postsCache.forEach(p => {
    const tags = (p.text||"").match(/#[\wğüşıöçĞÜŞİÖÇ]+/g) || [];
    new Set(tags.map(t => t.toLowerCase())).forEach(t => {
      counts[t] = (counts[t]||0) + 1;
    });
  });
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if (top.length === 0) return "";
  return `
    <div class="trendBox">
      <div class="trendTitle">📈 Gündem</div>
      ${top.map(([tag, n]) => `
        <button class="trendRow" data-hashtag="${esc(tag.slice(1))}">
          <span class="trendTag">${esc(tag)}</span>
          <span class="trendCount">${n} söz</span>
        </button>
      `).join("")}
    </div>
  `;
}

  const followerIds = Object.entries(usersCache).filter(([id,v]) => (v.following||[]).includes(uid)).map(([id]) => id);
  const ids = tab === 'followers' ? followerIds : followingIds;
  return `
    <button class="chatBack" id="followsBack">← ${esc(u.displayName)}</button>

      <button class="feedTab ${tab!=='followers'?'active':''}" data-followstab="following">Takip (${followingIds.length})</button>
      <button class="feedTab ${tab==='followers'?'active':''}" data-followstab="followers">Takipçi (${followerIds.length})</button>
    </div>

            <button class="actionBtn ${liked?'liked':''}" data-like="${p.id}">❤ ${(p.likes||[]).length}</button>
            <button class="actionBtn ${bookmarked?'bookmarked':''}" data-bookmark="${p.id}">🔖</button>
            <button class="actionBtn" data-share="${p.id}" title="Bağlantıyı kopyala">🔗</button>
          </div>
          ${replyHTML}
        </div>
      </div>
    </div>
  `;
}

function renderQuoteEmbed(quoteId){
  const q = postsCache.find(x=>x.id===quoteId);
  if (!q) return `<div class="quoteCard dim">Alıntılanan söz silinmiş.</div>`;
  const a = usersCache[q.authorUid] || { displayName: "Bilinmeyen" };
  return `
    <div class="quoteCard">
      <b>${esc(a.displayName)}</b>${verifiedBadge(a)} <span class="dim">· ${timeAgo(q.createdAt)}</span>
      ${q.text ? `<div style="margin-top:4px;">${linkify(q.text)}</div>` : ""}
      ${q.imageData ? `<img class="postImage" src="${q.imageData}" style="max-height:200px;" />` : ""}
    </div>`;
}

function renderPoll(p){
  const votes = p.pollVotes || {};
  let myVote = -1, total = 0;
  p.poll.forEach((o,i)=>{
    const arr = votes[i] || [];
    total += arr.length;
    if (arr.includes(currentUser.uid)) myVote = i;
  });
  const showResults = myVote >= 0 || p.authorUid === currentUser.uid;
  return `<div class="pollBox">` + p.poll.map((o,i)=>{
    const n = (votes[i]||[]).length;
    const pct = total ? Math.round(n*100/total) : 0;
    if (showResults) {
      return `<button class="pollOpt ${i===myVote?'mine':''}" data-vote="${p.id}|${i}">
        <div class="pollFill" style="width:${pct}%;"></div>
        <span class="pollLabel">${esc(o)}${i===myVote?' ✓':''}</span><span class="pollPct">${pct}%</span>
      </button>`;
    }
    return `<button class="pollOpt" data-vote="${p.id}|${i}"><span class="pollLabel">${esc(o)}</span></button>`;
  }).join("") + `<div class="dim" style="margin-top:2px;">${total} oy</div></div>`;
}

// ====== SÖZ DETAY SAYFASI ======
function renderPostDetail(postId){
  const p = postsCache.find(x => x.id === postId);
  if (!p) {
    return `<button class="chatBack" id="detailBack">← Geri</button>
      <div class="emptyState">Söz bulunamadı ya da silinmiş.</div>`;
  }
  const author = usersCache[p.authorUid] || { displayName: "Bilinmeyen" };
  const liked = (p.likes||[]).includes(currentUser.uid);
  const retweeted = (p.retweets||[]).includes(currentUser.uid);
  const bookmarked = (p.bookmarks||[]).includes(currentUser.uid);
  const comments = (commentsCache[p.id] || []).filter(c => !isBlockedBetween(c.authorUid));
  return `
    <button class="chatBack" id="detailBack">← Geri</button>
    <div style="padding:6px 0;">
      <div style="display:flex; align-items:center; gap:10px;">
        ${avatarHTML(author.displayName, 46, `data-profile="${p.authorUid}"`, author.photoURL)}
        <div style="flex:1; min-width:0;">
          <button class="linkName" data-profile="${p.authorUid}" style="font-size:15px;">${esc(author.displayName)}${verifiedBadge(author)}</button>
          ${(usersCache[p.authorUid]||{}).username ? `<div class="dim">@${esc(usersCache[p.authorUid].username)}</div>` : ((usersCache[p.authorUid]||{}).bio ? `<div class="dim" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${esc(usersCache[p.authorUid].bio)}</div>` : "")}
        </div>
        ${p.authorUid===currentUser.uid ? `<button class="iconGhost" data-pin="${p.id}" title="${currentUser.pinnedPost===p.id ? 'Sabitlemeyi kaldır' : 'Profilde sabitle'}" style="${currentUser.pinnedPost===p.id ? 'color:#C9A227;' : ''}">📌</button><button class="iconGhost" data-delete="${p.id}" title="Sil">🗑</button>` : ""}
      </div>
      ${p.text ? `<div class="postText" style="font-size:18px; margin-top:12px; line-height:1.5;">${linkify(p.text)}${p.edited ? ` <span class="dim" style="font-size:11px;">(düzenlendi)</span>` : ""}</div>` : ""}
      ${p.imageData ? `<img class="postImage" src="${p.imageData}" style="max-height:none;" />` : ""}
      ${videoEmbedHTML(p.text)}
      ${p.quoteOf ? renderQuoteEmbed(p.quoteOf) : ""}
      ${p.poll ? renderPoll(p) : ""}
      <div class="dim" style="margin-top:12px; font-size:13px;">${fullTime(p.createdAt)}</div>
      <div class="divider" style="margin:12px 0;"></div>
      <div class="actions" style="margin-top:0;">
        <span class="actionBtn" style="cursor:default;">💬 ${comments.length}</span>
        <button class="actionBtn ${retweeted?'retweeted':''}" data-retweet="${p.id}">🔁 ${(p.retweets||[]).length}</button>
        <button class="actionBtn" data-quote="${p.id}" title="Alıntıla">❝</button>
        <button class="actionBtn ${liked?'liked':''}" data-like="${p.id}">❤ ${(p.likes||[]).length}</button>
        <button class="actionBtn ${bookmarked?'bookmarked':''}" data-bookmark="${p.id}">🔖</button>
        <button class="actionBtn" data-share="${p.id}" title="Bağlantıyı kopyala">🔗</button>
        ${p.authorUid !== currentUser.uid ? `<button class="actionBtn" data-report="${p.authorUid}|${p.id}" title="Şikâyet et">🚩</button>` : ""}
      </div>
      <div class="divider" style="margin:12px 0;"></div>
      <div style="font-weight:700; font-size:15px; margin-bottom:10px;">Yanıtlar ${comments.length ? `(${comments.length})` : ""}</div>
      ${comments.length ? comments.map(c => {
        const cu = usersCache[c.authorUid] || { displayName: "Bilinmeyen" };
        return `<div class="commentRow" style="padding-left:0;">
          ${avatarHTML(cu.displayName, 32, `data-profile="${c.authorUid}"`, cu.photoURL)}
          <div style="flex:1; min-width:0;">
            <button class="linkName" data-profile="${c.authorUid}" style="font-size:13px;">${esc(cu.displayName)}${verifiedBadge(cu)}</button>
            <span class="dim">· ${timeAgo(c.createdAt)}</span>
            ${c.authorUid===currentUser.uid ? `<button class="iconGhost" data-delete-comment="${p.id}|${c.id}" title="Sil">🗑</button>` : ""}
            <div style="font-size:14px; margin-top:2px;">${linkify(c.text)}</div>
          </div>
        </div>`;
      }).join("") : `<div class="emptyState" style="padding:24px 0;">Henüz yanıt yok. İlk yanıtı sen yaz.</div>`}
      <div class="replyInputRow">
        <input id="reply-${p.id}" placeholder="Yanıt yaz…" maxlength="280" />
        <button class="smallBtn" data-comment="${p.id}" style="background:#C9A227; color:#0E1116; font-weight:700;">Gönder</button>
      </div>
    </div>
  `;
}

function bindPostEvents(){
  document.querySelectorAll('[data-profile]').forEach(el=>{
    el.onclick = () => { view = { name:'profile', user: el.getAttribute('data-profile') }; render(); };
  });
  document.querySelectorAll('[data-like]').forEach(el=>{
    el.onclick = () => toggleLike(el.getAttribute('data-like'));
  });
  document.querySelectorAll('[data-retweet]').forEach(el=>{
    el.onclick = () => toggleRetweet(el.getAttribute('data-retweet'));
  });
  document.querySelectorAll('[data-delete]').forEach(el=>{
    el.onclick = () => deletePost(el.getAttribute('data-delete'));
  });
  document.querySelectorAll('[data-bookmark]').forEach(el=>{
    el.onclick = () => toggleBookmark(el.getAttribute('data-bookmark'));
  });
  document.querySelectorAll('[data-quote]').forEach(el=>{
    el.onclick = () => {
      composerQuote = el.getAttribute('data-quote');
      view = { name: 'feed' };
      render();
      window.scrollTo(0, 0);
    };
  });
  document.querySelectorAll('[data-vote]').forEach(el=>{
    el.onclick = () => {
      const [postId, idx] = el.getAttribute('data-vote').split('|');
      voteOnPoll(postId, parseInt(idx));
    };
  });
  document.querySelectorAll('[data-edit]').forEach(el=>{
    el.onclick = () => { editingPostId = el.getAttribute('data-edit'); render(); };
  });
  document.querySelectorAll('[data-save-edit]').forEach(el=>{
    el.onclick = () => saveEditPost(el.getAttribute('data-save-edit'));
  });
  document.querySelectorAll('[data-cancel-edit]').forEach(el=>{
    el.onclick = () => { editingPostId = null; render(); };
  });
  function openPostDetail(id){
    if (view.name !== 'postDetail') detailReturn = view;
    view = { name:'postDetail', post: id };
    if (location.hash !== '#soz/' + id) history.replaceState(null, '', '#soz/' + id);
    render();
    loadComments(id);
    window.scrollTo(0, 0);
  }
  document.querySelectorAll('[data-share]').forEach(el=>{
    el.onclick = async () => {
      const link = location.origin + location.pathname + '#soz/' + el.getAttribute('data-share');
      try {
        await navigator.clipboard.writeText(link);
        showInfo("🔗 Söz bağlantısı kopyalandı.");
      } catch(e) {
        const ta = document.createElement('textarea');
        ta.value = link; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); showInfo("🔗 Söz bağlantısı kopyalandı."); }
        catch(e2){ showError("Kopyalanamadı: " + link); }
        ta.remove();
      }
    };
  });
  document.querySelectorAll('[data-reply]').forEach(el=>{
    el.onclick = () => openPostDetail(el.getAttribute('data-reply'));
  });
  document.querySelectorAll('[data-open]').forEach(el=>{
    el.onclick = () => openPostDetail(el.getAttribute('data-open'));
  });
  document.querySelectorAll('[data-pin]').forEach(el=>{
    el.onclick = () => togglePin(el.getAttribute('data-pin'));
  });
  document.querySelectorAll('[data-report]').forEach(el=>{
    el.onclick = () => {
      const [uid, pid] = el.getAttribute('data-report').split('|');
      reportContent(uid, pid);
    };
  });
  document.querySelectorAll('[data-followuser]').forEach(el=>{
    el.onclick = () => toggleFollow(el.getAttribute('data-followuser'));
  });
  document.querySelectorAll('[data-mention]').forEach(el=>{
    el.onclick = (e) => {
      e.stopPropagation();
      const tag = el.getAttribute('data-mention');
      const uid = findUserByMention(tag);
      if (uid) { view = { name:'profile', user: uid }; }
      else { searchQuery = tag; view = { name:'search' }; }
      render();
    };
  });
  document.querySelectorAll('[data-comment]').forEach(el=>{
    el.onclick = () => addComment(el.getAttribute('data-comment'));
  });
  document.querySelectorAll('[data-delete-comment]').forEach(el=>{
    el.onclick = () => {
      const [postId, commentId] = el.getAttribute('data-delete-comment').split('|');
      deleteComment(postId, commentId);
    };
  });
  document.querySelectorAll('[data-hashtag]').forEach(el=>{
    el.onclick = () => {
      searchQuery = '#' + el.getAttribute('data-hashtag');
      view = { name: 'search' };
      render();
    };
  });
}

// ====== ARAMA ======
function renderSearch(){
  return `
    <div class="searchInputWrap">
      <input id="searchInput" placeholder="Kullanıcı ya da #hashtag ara…" />
    </div>
    <div id="searchResults"></div>
  `;
}

function renderSearchResultsOnly(){
  const el = document.getElementById('searchResults');
  if (!el) return;
  const q = searchQuery.trim().toLowerCase();
  if (!q) { el.innerHTML = `<div class="emptyState">Bir kullanıcı adı ya da #hashtag yaz.</div>`; return; }

  if (q.startsWith('#')) {
    const tag = q.slice(1);
    const matches = postsCache.filter(p => (p.text||"").toLowerCase().includes('#'+tag) && !isBlockedBetween(p.authorUid));
    el.innerHTML = matches.length
      ? matches.map(renderPost).join("")
      : `<div class="emptyState">"#${esc(tag)}" ile ilgili söz bulunamadı.</div>`;
    bindPostEvents();
    return;
  }

  const qq = q.replace(/^@/, '');
  const matches = Object.entries(usersCache).filter(([id, u]) =>
    (u.displayName||"").toLowerCase().includes(qq) || (u.username||"").toLowerCase().includes(qq)
  );
  el.innerHTML = matches.length
    ? matches.map(([id, u]) => `
        <div class="userResultRow" data-profile="${id}">
          ${avatarHTML(u.displayName, 44, "", u.photoURL)}
          <div>
            <div style="font-weight:700;">${esc(u.displayName)}</div>
            ${u.username ? `<div class="dim">@${esc(u.username)}</div>` : ""}
            ${u.bio ? `<div class="dim">${esc(u.bio)}</div>` : ""}
          </div>
        </div>
      `).join("")
    : `<div class="emptyState">Kullanıcı bulunamadı.</div>`;
  document.querySelectorAll('#searchResults [data-profile]').forEach(elm=>{
    elm.onclick = () => { view = { name:'profile', user: elm.getAttribute('data-profile') }; render(); };
  });
}

// ====== MESAJLAR (DM) ======
function renderDMList(){
  const convos = {};
  dmsCache.forEach(m => {
    const other = m.fromUid === currentUser.uid ? m.toUid : m.fromUid;
    if (isBlockedBetween(other)) return;
    if (!convos[other]) convos[other] = { last: null, unread: 0 };
    convos[other].last = m; // artan sıralı, son mesaj kalır
    if (m.toUid === currentUser.uid && !m.read) convos[other].unread++;
  });
  const entries = Object.entries(convos).sort((a,b) => b[1].last.createdAt - a[1].last.createdAt);
  let html = `<h2 style="font-family:Georgia,serif; font-size:20px; margin-bottom:8px;">✉️ Mesajlar</h2>`;
  if (entries.length === 0) {
    return html + `<div class="emptyState">Henüz mesaj yok.<br>Bir profile girip "✉️ Mesaj"a bas.</div>`;
  }
  return html + entries.map(([uid, c]) => {
    const u = usersCache[uid] || { displayName: "Bilinmeyen" };
    return `
      <div class="dmRow" data-chat="${uid}">
        ${avatarHTML(u.displayName, 44, "", u.photoURL)}
        <div style="flex:1; min-width:0;">
          <div style="font-weight:700;">${esc(u.displayName)} ${c.unread ? `<span class="navBadge" style="position:static; margin-left:6px;">${c.unread}</span>` : ""}</div>
          <div class="dmPreview">${c.last.fromUid===currentUser.uid ? "Sen: " : ""}${esc(c.last.text)}</div>
        </div>
        <span class="dim">${timeAgo(c.last.createdAt)}</span>
      </div>`;
  }).join("");
}

function renderChat(otherUid){
  const u = usersCache[otherUid] || { displayName: "Bilinmeyen" };
  const msgs = dmsCache.filter(m =>
    (m.fromUid === otherUid && m.toUid === currentUser.uid) ||
    (m.fromUid === currentUser.uid && m.toUid === otherUid)
  );
  return `
    <button class="chatBack" id="chatBack">← Mesajlar</button>
    <div style="display:flex; align-items:center; gap:10px; padding:6px 0 10px; border-bottom:1px solid #1D2128;">
      ${avatarHTML(u.displayName, 36, "", u.photoURL)}
      <div style="font-weight:700;">${esc(u.displayName)}</div>
    </div>
    <div class="chatWrap">
      ${msgs.length ? msgs.map(m => `
        <div class="bubble ${m.fromUid===currentUser.uid ? 'bubbleMe' : 'bubbleThem'}">
          ${esc(m.text)}
          <div class="bubbleTime">${timeAgo(m.createdAt)}</div>
        </div>`).join("") : `<div class="emptyState">İlk mesajı sen gönder.</div>`}
    </div>
    <div class="chatInputBar">
      ${isBlockedBetween(otherUid)
        ? `<div class="emptyState" style="padding:10px 0; flex:1;">Engel nedeniyle mesajlaşma kapalı.</div>`
        : `<input id="chatInput" placeholder="Mesaj yaz…" maxlength="500" />
      <button class="smallBtn" id="chatSendBtn" style="background:#C9A227; color:#0E1116; font-weight:700;">Gönder</button>`}
    </div>
  `;
}

// ====== BİLDİRİMLER ======
function notifText(n){
  const fromUser = usersCache[n.fromUid] || { displayName: "Biri" };
  const name = esc(fromUser.displayName);
  if (n.type === 'like') return `<b>${name}</b> sözünü beğendi`;
  if (n.type === 'comment') return `<b>${name}</b> sözüne yanıt yazdı`;
  if (n.type === 'follow') return `<b>${name}</b> seni takip etmeye başladı`;
  if (n.type === 'quote') return `<b>${name}</b> sözünü alıntıladı`;
  if (n.type === 'mention') return `<b>${name}</b> senden bahsetti`;
  return `<b>${name}</b> bir işlem yaptı`;
}
function notifIcon(type){
  if (type === 'like') return '❤';
  if (type === 'comment') return '💬';
  if (type === 'follow') return '➕';
  if (type === 'quote') return '❝';
  if (type === 'mention') return '@';
  return '🔔';
}
function renderNotifications(){
  const items = notificationsCache.filter(n => !isBlockedBetween(n.fromUid));
  if (items.length === 0) {
    return `<div class="emptyState">Henüz bildirim yok.</div>`;
  }
  return items.map(n => `
    <div class="notifItem ${n.read ? '' : 'unread'}" data-notif-goto="${n.fromUid}" data-notif-post="${n.postId || ''}">
      <div class="notifIcon">${notifIcon(n.type)}</div>
      <div style="flex:1;">
        <div style="font-size:14px;">${notifText(n)}</div>
        <div class="dim">${timeAgo(n.createdAt)}</div>
      </div>
    </div>
  `).join("");
}
