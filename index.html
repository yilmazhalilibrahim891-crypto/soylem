<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:#0E1116; font-family: system-ui, -apple-system, sans-serif; color:#ECE8DD; }
  .hidden { display:none !important; }
  .dim { color:#8B8F98; font-size:13px; }

  /* Login */
  #loginScreen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { background:#171B21; border:1px solid #262B33; border-radius:14px; padding:36px 32px; width:100%; max-width:340px; text-align:center; }
  .brand { font-family: Georgia, serif; font-size:28px; letter-spacing:0.5px; }
  .brandRow { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:6px; }
  .sub { color:#8B8F98; font-size:14px; margin:2px 0 22px; }
  input, textarea { width:100%; background:#0E1116; border:1px solid #2A2F38; border-radius:8px; padding:12px 14px; color:#ECE8DD; font-size:15px; outline:none; font-family:inherit; }
  textarea { resize:none; }
  .err { color:#D64550; font-size:12px; margin-top:6px; text-align:left; min-height:16px; }
  .btnPrimary { width:100%; margin-top:10px; background:#C9A227; color:#0E1116; border:none; border-radius:8px; padding:12px 0; font-weight:700; font-size:14px; cursor:pointer; }
  .btnPrimary:disabled { opacity:0.5; }
  .toggleAuth { margin-top:16px; color:#C9A227; font-size:13px; cursor:pointer; background:none; border:none; text-decoration:underline; }
  .note { color:#5B5F66; font-size:12px; margin-top:14px; line-height:1.5; }

  /* App shell */
  #appShell { display:flex; min-height:100vh; }
  #sidebar { width:76px; border-right:1px solid #1D2128; padding:20px 8px; display:flex; flex-direction:column; align-items:center; position:sticky; top:0; height:100vh; }
  @media(min-width:640px){ #sidebar{ width:200px; align-items:stretch; padding:20px 12px; } }
  .navBtn { display:flex; align-items:center; gap:12px; background:transparent; color:#ECE8DD; border:none; border-radius:10px; padding:12px; font-size:15px; cursor:pointer; margin-bottom:4px; width:100%; justify-content:center; }
  @media(min-width:640px){ .navBtn{ justify-content:flex-start; padding:12px 14px; } }
  .navBtn.active { background:#1D2128; color:#C9A227; font-weight:700; }
  .navLabel { display:none; }
  @media(min-width:640px){ .navLabel{ display:inline; } }
  #main { flex:1; max-width:640px; padding:20px 16px 60px; }
  .composer { display:flex; gap:12px; }
  .avatar { border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:Georgia,serif; font-weight:700; color:#0E1116; flex-shrink:0; cursor:pointer; border:none; }
  .divider { height:1px; background:#1D2128; margin:16px 0; }
  .postCard { padding:14px 0; border-bottom:1px solid #1D2128; }
  .avatarImg { width:100%; height:100%; object-fit:cover; display:block; }
  .postImage { width:100%; max-height:420px; object-fit:cover; border-radius:12px; margin-top:10px; border:1px solid #262B33; }
  .composerImgWrap { position:relative; margin-top:10px; display:inline-block; }
  .composerImgWrap img { max-width:100%; max-height:220px; border-radius:12px; display:block; }
  .removeImgBtn { position:absolute; top:6px; right:6px; background:rgba(14,17,22,0.8); color:#ECE8DD; border:none; border-radius:50%; width:26px; height:26px; cursor:pointer; font-size:14px; }
  .composerToolbar { display:flex; align-items:center; gap:10px; }
  .imgPickBtn { background:none; border:none; color:#8B8F98; cursor:pointer; padding:6px; }
  .profilePhotoBtn { position:absolute; bottom:0; right:0; background:#C9A227; color:#0E1116; border:none; border-radius:50%; width:26px; height:26px; font-size:13px; cursor:pointer; }
  .avatarWrap { position:relative; display:inline-block; }
  .postRow { display:flex; gap:12px; }
  .linkName { background:none; border:none; color:#ECE8DD; font-weight:700; font-size:14px; cursor:pointer; padding:0; }
  .postText { color:#ECE8DD; font-size:15px; margin-top:4px; line-height:1.45; white-space:pre-wrap; word-break:break-word; }
  .actions { display:flex; gap:22px; margin-top:10px; }
  .actionBtn { display:flex; align-items:center; gap:6px; background:none; border:none; cursor:pointer; padding:4px; color:#8B8F98; font-size:13px; }
  .actionBtn.liked { color:#D64550; }
  .actionBtn.retweeted { color:#5E8C61; }
  .iconGhost { background:none; border:none; cursor:pointer; margin-left:4px; color:#8B8F98; }
  .replyBox { margin-top:10px; }
  .commentRow { display:flex; gap:8px; margin-bottom:10px; padding-left:6px; }
  .replyInputRow { display:flex; gap:8px; margin-top:8px; }
  .replyInputRow input { border-radius:16px; padding:8px 14px; font-size:13px; }
  .smallBtn { background:#2A2F38; color:#ECE8DD; border:none; border-radius:16px; padding:6px 14px; font-size:13px; cursor:pointer; }
  .followBtn { background:#C9A227; color:#0E1116; border:none; border-radius:20px; padding:8px 18px; font-weight:700; font-size:13px; cursor:pointer; }
  .followingBtn { background:transparent; color:#C9A227; border:1px solid #C9A227; border-radius:20px; padding:8px 18px; font-weight:700; font-size:13px; cursor:pointer; }
  .profileHeader { display:flex; gap:16px; align-items:flex-start; padding:10px 0; }
  .profileName { font-size:20px; font-weight:700; font-family:Georgia,serif; }
  .emptyState { color:#5B5F66; text-align:center; padding:60px 0; font-size:15px; }
  .banner { background:#3a1f22; color:#f2c6ca; padding:8px 12px; border-radius:8px; margin-bottom:12px; font-size:13px; }
  svg { display:block; }
  .navBadge { background:#D64550; color:#fff; font-size:10px; font-weight:700; border-radius:10px; min-width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; padding:0 4px; margin-left:auto; }
  @media(max-width:639px){ .navBadge{ position:absolute; top:6px; right:14px; margin-left:0; } }
  .navBtn { position:relative; }
  .hashtag, .postLink { color:#C9A227; text-decoration:none; }
  .searchInputWrap { margin-bottom:16px; }
  .notifItem { display:flex; gap:10px; padding:12px 0; border-bottom:1px solid #1D2128; cursor:pointer; }
  .notifItem.unread { background:rgba(201,162,39,0.06); }
  .notifIcon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#171B21; flex-shrink:0; font-size:16px; }
  .bioEditBox { margin-top:8px; }
  .bioEditBox textarea { font-size:14px; }
  .editBioBtn { background:none; border:1px solid #2A2F38; color:#8B8F98; border-radius:14px; padding:4px 12px; font-size:12px; cursor:pointer; margin-top:8px; }
  .userResultRow { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid #1D2128; cursor:pointer; }
  .feedTabs { display:flex; border-bottom:1px solid #1D2128; margin-bottom:4px; }
  .feedTab { flex:1; background:none; border:none; color:#8B8F98; font-size:14px; font-weight:600; padding:12px 0; cursor:pointer; border-bottom:2px solid transparent; }
  .feedTab.active { color:#C9A227; border-bottom-color:#C9A227; }
  .trendBox { background:#171B21; border:1px solid #262B33; border-radius:14px; padding:14px 16px; margin-bottom:16px; }
  .trendTitle { font-family:Georgia,serif; font-size:16px; font-weight:700; margin-bottom:8px; }
  .trendRow { display:flex; justify-content:space-between; align-items:center; padding:7px 0; cursor:pointer; border:none; background:none; width:100%; text-align:left; }
  .trendTag { color:#C9A227; font-weight:700; font-size:14px; }
  .trendCount { color:#5B5F66; font-size:12px; }
  .dmRow { display:flex; gap:12px; align-items:center; padding:12px 0; border-bottom:1px solid #1D2128; cursor:pointer; }

<script>
// ====== FIREBASE CONFIG ======
const firebaseConfig = {
  apiKey: "AIzaSyCX7lCeYAalq9iV2VDOEO9p5mnHEItPx0c",
  authDomain: "soylem-app.firebaseapp.com",
  projectId: "soylem-app",
  storageBucket: "soylem-app.firebasestorage.app",
  messagingSenderId: "363422182384",
  appId: "1:363422182384:web:ced78eee7d4def255a4b35",
  measurementId: "G-MFELW2NVZF"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ====== STATE ======
let currentUser = null; // {uid, displayName, bio, following:[]}
let usersCache = {};
let postsCache = [];
let view = { name: "feed" };
let isSignup = false;
let composerImageData = null;
let uploadingPhoto = false;
let notificationsCache = [];
let searchQuery = "";
let editingBio = false;
let feedFilter = "all"; // "all" | "following"
let dmsCache = [];
let editingPostId = null;
let chatDraft = "";
let composerQuote = null; // alıntılanan söz id'si
let composerPoll = null;  // ["seçenek1","seçenek2",...] veya null
let detailReturn = null;  // söz detayından geri dönülecek görünüm
let editingUsername = false;
let handledHash = false;  // sayfa açılışında #soz/ID linki bir kez işlensin
let feedLimit = 30;       // sonsuz kaydırma: yüklenen söz sayısı
let loadingMore = false;

// Sayfa dibine yaklaşınca daha fazla söz yükle
window.addEventListener('scroll', () => {
  if (!currentUser || view.name !== 'feed' || loadingMore) return;
  if (postsCache.length < feedLimit) return; // daha eski söz yok
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 600) {
    loadingMore = true;
    feedLimit += 30;
    startPostsListener();
  }
});

// PWA: service worker kaydı (sw.js repoda ayrıca olmalı)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

// Tema
if (localStorage.getItem('soylemTheme') === 'light') document.body.classList.add('light');

// ====== HELPERS ======
function timeAgo(ts){
  if(!ts) return "";
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return `${s}sn`;
  const m = Math.floor(s/60); if (m<60) return `${m}dk`;
  const h = Math.floor(m/60); if (h<24) return `${h}sa`;
  return `${Math.floor(h/24)}g`;
}
const HUES = ["#C9A227","#8A6BB1","#4E8098","#B1543F","#5E8C61"];
function hueFor(name){
  const s = (name||"").split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  return HUES[s % HUES.length];
}
function avatarHTML(name, size=40, onclick="", photoURL=null){
  if (photoURL) {
    return `<button class="avatar" ${onclick} style="width:${size}px;height:${size}px;padding:0;overflow:hidden;"><img class="avatarImg" src="${photoURL}" /></button>`;
  }
  const letter = (name||"?").trim().charAt(0).toUpperCase();
  return `<button class="avatar" ${onclick} style="width:${size}px;height:${size}px;background:${hueFor(name)};font-size:${size*0.42}px;">${letter}</button>`;
}
function esc(s){ const d=document.createElement('div'); d.innerText = s||""; return d.innerHTML; }

// Metindeki #hashtag ve linkleri tıklanabilir hale getirir (önce escape edilir, XSS güvenli)
function linkify(text){
  let safe = esc(text||"");
  safe = safe.replace(/(https?:\/\/[^\s<]+)/g, (m) => `<a class="postLink" href="${m}" target="_blank" rel="noopener">${m}</a>`);
  safe = safe.replace(/(^|[\s])#([\wğüşıöçĞÜŞİÖÇ]+)/g, (m, pre, tag) => `${pre}<span class="hashtag" data-hashtag="${esc(tag)}">#${esc(tag)}</span>`);
  safe = safe.replace(/(^|[\s])@([\wğüşıöçĞÜŞİÖÇ]+)/g, (m, pre, name) => `${pre}<span class="hashtag" data-mention="${esc(name)}">@${esc(name)}</span>`);
  return safe;
}

// @etiket -> kullanıcı eşleştirme (ad boşluksuz ya da ilk isim)
function findUserByMention(tag){
  const t = (tag||"").toLowerCase();
  if (!t) return null;
  for (const [id, u] of Object.entries(usersCache)) {
    if ((u.username||"").toLowerCase() === t) return id;
  }
  for (const [id, u] of Object.entries(usersCache)) {
    const dn = (u.displayName||"").toLowerCase().trim();
    if (dn.replace(/\s+/g,'') === t || dn.split(/\s+/)[0] === t) return id;
  }
  return null;
}

// Metindeki @etiketlere bildirim gönderir
function notifyMentions(text, postId){
  const tags = (text||"").match(/(^|[\s])@([\wğüşıöçĞÜŞİÖÇ]+)/g) || [];
  const done = new Set();
  tags.forEach(t => {
    const uid = findUserByMention(t.trim().slice(1));
    if (uid && !done.has(uid)) {
      done.add(uid);
      createNotification(uid, 'mention', postId ? { postId } : {});
    }
  });
}

// Resmi küçültüp base64'e çevirir (Firestore belge boyutu sınırlı olduğu için)
function resizeImageFile(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
        else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function showError(msg){
  const el = document.getElementById('errorBanner');
  el.textContent = msg; el.classList.remove('hidden');
  setTimeout(()=>el.classList.add('hidden'), 4000);
}
function showInfo(msg){
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.style.background = '#1f3a24'; el.style.color = '#bfe3c2';
  el.classList.remove('hidden');
  setTimeout(()=>{ el.classList.add('hidden'); el.style.background=''; el.style.color=''; }, 3000);
}

// ====== AUTH UI ======
document.getElementById('toggleAuthMode').onclick = () => {
  isSignup = !isSignup;
  document.getElementById('signupNameField').classList.toggle('hidden', !isSignup);
  document.getElementById('signupUsernameField').classList.toggle('hidden', !isSignup);
  document.getElementById('authSubmitBtn').textContent = isSignup ? "Kayıt ol" : "Giriş yap";
  document.getElementById('toggleAuthMode').textContent = isSignup ? "Zaten hesabın var mı? Giriş yap" : "Hesabın yok mu? Kayıt ol";
  document.getElementById('authError').textContent = "";
};

document.getElementById('authSubmitBtn').onclick = async () => {
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const displayName = document.getElementById('displayNameInput').value.trim();
  const errEl = document.getElementById('authError');
  errEl.textContent = "";

  errEl.style.color = "";
  if (!email || !password) { errEl.textContent = "E-posta ve şifre gerekli."; return; }
  if (isSignup && !displayName) { errEl.textContent = "Görünen ad gerekli."; return; }
  let username = "";
  if (isSignup) {
    username = document.getElementById('usernameInput').value.trim().toLowerCase().replace(/^@/, '');
    if (!/^[a-z0-9_]{3,15}$/.test(username)) {
      errEl.textContent = "Kullanıcı adı 3-15 karakter olmalı; sadece küçük harf, rakam ve _ içerebilir.";
      return;
    }
  }

  try {
    if (isSignup) {
      const taken = await db.collection('users').where('username', '==', username).limit(1).get();
      if (!taken.empty) { errEl.textContent = "Bu kullanıcı adı alınmış, başka bir tane dene."; return; }
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      await db.collection('users').doc(cred.user.uid).set({
        displayName, username, bio: "", following: [], createdAt: Date.now()
      });
    } else {
      await auth.signInWithEmailAndPassword(email, password);
    }
  } catch (e) {
    errEl.textContent = friendlyAuthError(e.code);
  }
};

function friendlyAuthError(code){
  const map = {
    'auth/email-already-in-use': 'Bu e-posta zaten kayıtlı.',
    'auth/invalid-email': 'Geçersiz e-posta adresi.',
    'auth/weak-password': 'Şifre en az 6 karakter olmalı.',
    'auth/user-not-found': 'Kullanıcı bulunamadı.',
    'auth/wrong-password': 'Şifre yanlış.',
    'auth/invalid-credential': 'E-posta veya şifre yanlış.',
  };
  return map[code] || 'Bir hata oluştu, tekrar dene.';
}

document.getElementById('navLogout').onclick = () => auth.signOut();

// Şifre sıfırlama
document.getElementById('forgotPassBtn').onclick = async () => {
  const email = document.getElementById('emailInput').value.trim();
  const errEl = document.getElementById('authError');
  errEl.style.color = "";
  if (!email) { errEl.textContent = "Önce yukarıya e-posta adresini yaz, sonra buna bas."; return; }
  try {
    await auth.sendPasswordResetEmail(email);
    errEl.style.color = "#5E8C61";
    errEl.textContent = "Sıfırlama bağlantısı e-postana gönderildi. Gelen kutunu (ve spam'i) kontrol et.";
  } catch (e) {
    errEl.textContent = friendlyAuthError(e.code);
  }
};

// Google ile giriş
document.getElementById('googleAuthBtn').onclick = async () => {
  const errEl = document.getElementById('authError');
  errEl.style.color = "";
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
  } catch (e) {
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/cancelled-popup-request' || e.code === 'auth/operation-not-supported-in-this-environment') {
      try { await auth.signInWithRedirect(provider); } catch(e2){ errEl.textContent = "Google ile giriş başarısız oldu."; }
    } else if (e.code !== 'auth/popup-closed-by-user') {
      errEl.textContent = "Google ile giriş başarısız: " + (e.message || e.code);
    }
  }
};

// ====== AUTH STATE ======
let unsubUsers = null, unsubPosts = null, unsubNotifs = null, unsubDMs = null;
auth.onAuthStateChanged(async (user) => {
  document.getElementById('loadingScreen').classList.add('hidden');
  if (user) {
    const doc = await db.collection('users').doc(user.uid).get();
    let data;
    if (doc.exists) {
      data = doc.data();
    } else {
      // İlk kez giren (Google ile) kullanıcı için profil oluştur
      data = {
        displayName: user.displayName || (user.email ? user.email.split('@')[0] : "Yeni Üye"),
        bio: "", following: [], createdAt: Date.now()
      };
      if (user.photoURL) data.photoURL = user.photoURL;
      try { await db.collection('users').doc(user.uid).set(data); } catch(e){}
    }
    currentUser = { uid: user.uid, ...data };
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appShell').classList.remove('hidden');
    startListeners();
    view = { name: "feed" };
    render();
  } else {
    currentUser = null;
    if (unsubUsers) unsubUsers();
    if (unsubPosts) unsubPosts();
    if (unsubNotifs) unsubNotifs();
    if (unsubDMs) unsubDMs();
    document.getElementById('appShell').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
  }
});

function startPostsListener(){
  if (unsubPosts) unsubPosts();
  unsubPosts = db.collection('posts').orderBy('createdAt','desc').limit(feedLimit).onSnapshot(snap => {
    postsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    loadingMore = false;
    if (!handledHash) {
      handledHash = true;
      const m = location.hash.match(/^#soz\/([A-Za-z0-9]+)/);
      if (m && postsCache.find(p => p.id === m[1])) {
        view = { name: 'postDetail', post: m[1] };
        loadComments(m[1]);
      }
    }
    render();
  }, err => showError("Gönderiler yüklenemedi."));
}

function startListeners(){
  unsubUsers = db.collection('users').onSnapshot(snap => {
    usersCache = {};
    snap.forEach(d => usersCache[d.id] = d.data());
    if (currentUser && usersCache[currentUser.uid]) {
      currentUser = { uid: currentUser.uid, ...usersCache[currentUser.uid] };
    }
    render();
  }, err => showError("Kullanıcılar yüklenemedi."));

  startPostsListener();

  unsubNotifs = db.collection('notifications')
    .where('toUid', '==', currentUser.uid)
    .orderBy('createdAt', 'desc')
    .limit(50)
    .onSnapshot(snap => {
      notificationsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateNotifBadge();
      if (view.name === 'notifications') render();
    }, err => {});

  unsubDMs = db.collection('messages')
    .where('participants', 'array-contains', currentUser.uid)
    .onSnapshot(snap => {
      dmsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      dmsCache.sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
      updateDMBadge();
      if (view.name === 'dms' || view.name === 'chat') render();
    }, err => {});
}

// ====== ACTIONS ======
function pollReady(){
  return composerPoll && composerPoll.map(s=>s.trim()).filter(Boolean).length >= 2;
}
function canPostNow(){
  const ta = document.getElementById('composerText');
  const t = ta ? ta.value.trim() : "";
  return !!(t || composerImageData || composerQuote || pollReady());
}

async function postTweet(){
  const ta = document.getElementById('composerText');
  const text = ta.value.trim();
  if (!canPostNow() || !currentUser) return;
  ta.disabled = true;
  try {
    const data = {
      authorUid: currentUser.uid,
      text,
      createdAt: Date.now(),
      likes: [],
      retweets: [],
    };
    if (composerImageData) data.imageData = composerImageData;
    if (composerQuote) data.quoteOf = composerQuote;
    if (pollReady()) {
      data.poll = composerPoll.map(s=>s.trim()).filter(Boolean);
      data.pollVotes = {};
    }
    const docRef = await db.collection('posts').add(data);
    notifyMentions(text, docRef.id);
    if (composerQuote) {
      const q = postsCache.find(p=>p.id===composerQuote);
      if (q) createNotification(q.authorUid, 'quote', { postId: composerQuote });
    }
    ta.value = "";
    composerImageData = null;
    composerQuote = null;
    composerPoll = null;
    render();
  } catch(e){ showError("Gönderilemedi, tekrar dene. (Resim çok büyük olabilir)"); }
  ta.disabled = false;
}

function preserveComposerTextAcrossRender(fn){
  const ta = document.getElementById('composerText');
  const savedText = ta ? ta.value : "";
  fn();
  render();
  const newTa = document.getElementById('composerText');
  if (newTa) {
    newTa.value = savedText;
    document.getElementById('charCount').textContent = 280 - savedText.length;
    document.getElementById('postBtn').disabled = !canPostNow();
  }
}

async function voteOnPoll(postId, idx){
  const post = postsCache.find(p=>p.id===postId);
  if (!post || !post.poll) return;
  const votes = post.pollVotes || {};
  let myVote = -1;
  post.poll.forEach((o,i)=>{ if ((votes[i]||[]).includes(currentUser.uid)) myVote = i; });
  if (myVote === idx) return;
  const upd = {};
  upd['pollVotes.'+idx] = firebase.firestore.FieldValue.arrayUnion(currentUser.uid);
  if (myVote >= 0) upd['pollVotes.'+myVote] = firebase.firestore.FieldValue.arrayRemove(currentUser.uid);
  try { await db.collection('posts').doc(postId).update(upd); }
  catch(e){ showError("Oy verilemedi."); }
}

// İki kullanıcı arasında engel var mı? (ben onu ya da o beni)
function isBlockedBetween(uid){
  if (!currentUser || !uid || uid === currentUser.uid) return false;
  if ((currentUser.blocked||[]).includes(uid)) return true;
  if (((usersCache[uid]||{}).blocked||[]).includes(currentUser.uid)) return true;
  return false;
}

// Metindeki YouTube ya da mp4/webm linkini oynatıcıya çevirir
function videoEmbedHTML(text){
  const t = text || "";
  const yt = t.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([\w-]{6,20})/);
  if (yt) return `<iframe class="videoEmbed" src="https://www.youtube.com/embed/${yt[1]}" allowfullscreen loading="lazy"></iframe>`;
  const mp4 = t.match(/https?:\/\/[^\s<]+\.(?:mp4|webm)/i);
  if (mp4) return `<video class="videoFile" src="${mp4[0]}" controls preload="metadata"></video>`;
  return "";
}

  const input = document.getElementById('usernameEditInput');
  if (!input) return;
  const username = input.value.trim().toLowerCase().replace(/^@/, '');
  if (!/^[a-z0-9_]{3,15}$/.test(username)) {
    showError("Kullanıcı adı 3-15 karakter olmalı; sadece küçük harf, rakam ve _ içerebilir.");
    return;
  }
  try {
    const taken = await db.collection('users').where('username', '==', username).limit(1).get();
    if (!taken.empty) { showError("Bu kullanıcı adı alınmış, başka bir tane dene."); return; }
    await db.collection('users').doc(currentUser.uid).update({ username });
    editingUsername = false;
    showInfo("Kullanıcı adın artık @" + username);
  } catch(e){ showError("Kaydedilemedi, tekrar dene."); }
}

function render(){

  document.querySelectorAll('.navBtn').forEach(b=>b.classList.remove('active'));

  if (view.name === 'profile' && view.user === currentUser.uid) document.getElementById('navProfile').classList.add('active');

  if (view.name === 'notifications') document.getElementById('navNotifs').classList.add('active');
  if (view.name === 'dms' || view.name === 'chat') document.getElementById('navDMs').classList.add('active');
  if (view.name === 'saved') document.getElementById('navSaved').classList.add('active');

      composerPoll = composerPoll ? null : ["",""];
    });

      el.oninput = (e) => {

      };
    });

    const pollRemoveBtn = document.getElementById('pollRemoveBtn');

    const removeQuoteBtn = document.getElementById('removeQuoteBtn');

    });
  } else if (view.name === 'chat') {
    dmsEl.classList.remove('hidden');
    dmsEl.innerHTML = renderChat(view.user);
    document.getElementById('chatBack').onclick = () => { view = { name:'dms' }; render(); };
    const csb = document.getElementById('chatSendBtn');
    if (csb) csb.onclick = () => sendDM(view.user);
    const ci = document.getElementById('chatInput');
    if (ci) {
      ci.value = chatDraft;
      ci.oninput = (e) => { chatDraft = e.target.value; };
      ci.onkeydown = (e) => { if (e.key === 'Enter') sendDM(view.user); };
    }
    markChatRead(view.user);
    window.scrollTo(0, document.body.scrollHeight);
  } else if (view.name === 'saved') {
    savedEl.classList.remove('hidden');
    const saved = postsCache.filter(p => (p.bookmarks||[]).includes(currentUser.uid) && !isBlockedBetween(p.authorUid));
    savedEl.innerHTML = `<h2 style="font-family:Georgia,serif; font-size:20px; margin-bottom:8px;">🔖 Kaydedilenler</h2>` +
      (saved.length ? saved.map(renderPost).join("") : `<div class="emptyState">Henüz kaydedilen söz yok.<br>Sözlerdeki 🔖 ikonuna basarak kaydet.</div>`);
    bindPostEvents();
  }
}

// ====== TAKİP ÖNERİLERİ ======
function renderSuggestions(){
  const counts = {};
  Object.values(usersCache).forEach(u => {
    (u.following||[]).forEach(f => counts[f] = (counts[f]||0) + 1);
  });
  const skip = new Set([...(currentUser.following||[]), currentUser.uid]);
  const cands = Object.keys(usersCache)
    .filter(id => !skip.has(id) && !isBlockedBetween(id))
    .sort((a,b) => (counts[b]||0) - (counts[a]||0))
    .slice(0, 5);
  if (!cands.length) return "";
  return `
    <div class="trendBox">
      <div class="trendTitle">✨ Tanıyor olabileceklerin</div>
      ${cands.map(id => {
        const u = usersCache[id] || { displayName: "?" };
        return `<div class="suggestRow">
          <span data-profile="${id}" style="display:flex; align-items:center; gap:10px; flex:1; min-width:0; cursor:pointer;">
            ${avatarHTML(u.displayName, 36, "", u.photoURL)}
            <span style="min-width:0;">
              <span style="font-weight:700; font-size:14px; display:block;">${esc(u.displayName)}${verifiedBadge(u)}</span>
              ${u.username ? `<span class="dim" style="display:block;">@${esc(u.username)}</span>` : ""}
            </span>
          </span>
          <button class="followBtn" data-followuser="${id}" style="flex-shrink:0;">Takip et</button>
        </div>`;
      }).join("")}
    </div>
  `;
}

// ====== GÜNDEM (TREND HASHTAGLER) ======
function renderTrends(){
  const counts = {};
  postsCache.forEach(p => {
    const tags = (p.text||"").match(/#[\wğüşıöçĞÜŞİÖÇ]+/g) || [];
    new Set(tags.map(t => t.toLowerCase())).forEach(t => {
      counts[t] = (counts[t]||0) + 1;
    });
  });
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if (top.length === 0) return "";
  return `
    <div class="trendBox">
      <div class="trendTitle">📈 Gündem</div>
      ${top.map(([tag, n]) => `
        <button class="trendRow" data-hashtag="${esc(tag.slice(1))}">
          <span class="trendTag">${esc(tag)}</span>
          <span class="trendCount">${n} söz</span>
        </button>
      `).join("")}
    </div>
  `;
}
